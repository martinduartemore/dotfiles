# General
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:RGB"
set -g mode-keys vi
set -g status-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -g display-time 2000
set -sg escape-time 0
set -g mouse on
set -g status-interval 5
set -g renumber-windows on

# Name windows after the current dir; don't let programs rename them.
setw -g allow-rename off
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Status bar — accents inherit the terminal ANSI palette; bar surface is fixed.
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style "bg=#2c313c,fg=colour8"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=#{?client_prefix,colour4,colour8}] #S #[default]"
set -g window-status-style "fg=colour8"
set -g window-status-current-style "fg=colour7"
set -g window-status-separator " • "
set -g window-status-format "#W"
set -g window-status-current-format "#W"
set -g window-status-activity-style "fg=colour3"
set -g status-right "#[fg=colour8]%H:%M "
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour7"
set -g message-style "bg=default,fg=colour7"
set -g message-command-style "bg=default,fg=colour7"
set -g mode-style "bg=colour8,fg=default"
set -g clock-mode-colour colour4

# Bindings
bind-key | split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode — clipboard is pbcopy on macOS, xclip on Linux.
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
if-shell 'uname | grep -q Darwin' {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe 'pbcopy' \; send-keys -X clear-selection
  bind-key -T copy-mode-vi 'C-c' send-keys -X copy-pipe 'pbcopy' \; send-keys -X clear-selection
} {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe 'xclip -selection clipboard -i' \; send-keys -X clear-selection
  bind-key -T copy-mode-vi 'C-c' send-keys -X copy-pipe 'xclip -selection clipboard -i' \; send-keys -X clear-selection
}
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

bind X kill-session
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded configuration file."
bind / list-keys
